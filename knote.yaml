# --- PASTE THIS INTO A FILE NAMED 'knote.yaml' IN YOUR GITHUB REPO ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knote
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knote
  template:
    metadata:
      labels:
        app: knote
    spec:
      containers:
      - name: knote
        image: k8s.gcr.io/echoserver:1.4  # Using a standard echo image for practice
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: knote-service
  namespace: default
spec:
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: knote
