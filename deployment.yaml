apiVersion: apps/v1
kind: Deployment
metadata:
  name: knote
 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knote
  template:
    metadata:
      labels:
        app: knote
    spec:
      containers:
      - name: knote
        image: learnk8s/knote-js:1.0.0
        ports:
        - containerPort: 3000
